name: Release Companion

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. companion-v0.2.0)'
        required: true
        default: 'companion-v0.2.0'
      target:
        description: 'Platform to build (linux / macos / windows / all)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: silvertune-companion-linux
            binary: companion/build/silvertune-companion
          - os: windows-latest
            artifact: silvertune-companion-windows.exe
            binary: companion/build/Release/silvertune-companion.exe
          - os: macos-latest
            artifact: silvertune-companion-macos
            binary: companion/build/silvertune-companion

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev cmake

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S companion -B companion/build -DCMAKE_BUILD_TYPE=Release -DCOMPANION_VERSION="${{ github.event.inputs.tag }}"

      - name: Configure (macOS universal)
        if: runner.os == 'macOS'
        run: cmake -S companion -B companion/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCOMPANION_VERSION="${{ github.event.inputs.tag }}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S companion -B companion/build -DCOMPANION_VERSION="${{ github.event.inputs.tag }}"

      - name: Build
        run: cmake --build companion/build --config Release

      - name: Rename binary
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Silvertune Companion ${{ github.event.inputs.tag }}
          body: |
            ## Silvertune Companion

            Native low-latency audio bridge for [silvertune.live](https://silvertune.live).

            Download the binary for your platform, run it, then open the web app — it will detect the companion automatically and switch to native audio mode (~5ms latency).

            ### Install

            **Linux**
            ```bash
            chmod +x silvertune-companion-linux
            ./silvertune-companion-linux
            ```

            **macOS**
            ```bash
            chmod +x silvertune-companion-macos
            # right-click → Open to bypass Gatekeeper on first run
            ./silvertune-companion-macos
            ```

            **Windows** — download `silvertune-companion-windows.exe` and run it.
          files: |
            artifacts/silvertune-companion-linux/silvertune-companion-linux
            artifacts/silvertune-companion-macos/silvertune-companion-macos
            artifacts/silvertune-companion-windows.exe/silvertune-companion-windows.exe
          fail_on_unmatched_files: false
