name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. plugin-v0.1.0)'
        required: true
        default: 'plugin-v0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: silvertune-plugin-linux
          - os: windows-latest
            artifact: silvertune-plugin-windows
          - os: macos-latest
            artifact: silvertune-plugin-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev \
            libglib2.0-dev \
            pkg-config

      - name: Build macOS universal plugin
        if: runner.os == 'macOS'
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo xtask bundle silvertune-plugin --release --target x86_64-apple-darwin
          cargo xtask bundle silvertune-plugin --release --target aarch64-apple-darwin
          # Combine into universal binaries
          for BUNDLE in target/x86_64-apple-darwin/bundled/*.vst3/Contents/MacOS/* \
                        target/x86_64-apple-darwin/bundled/*.clap/Contents/MacOS/*; do
            REL="${BUNDLE#target/x86_64-apple-darwin/bundled/}"
            ARM="target/aarch64-apple-darwin/bundled/$REL"
            OUT="target/bundled/$REL"
            mkdir -p "$(dirname "$OUT")"
            lipo -create "$BUNDLE" "$ARM" -output "$OUT"
          done
          # Copy Info.plist / PkgInfo etc. from one arch
          for BUNDLE in target/x86_64-apple-darwin/bundled/*/; do
            NAME="$(basename "$BUNDLE")"
            rsync -a --exclude 'MacOS' "$BUNDLE" "target/bundled/$NAME/"
          done
          cd target/bundled
          zip -r ../../${{ matrix.artifact }}.zip .

      - name: Build Linux plugin
        if: runner.os == 'Linux'
        run: |
          cargo xtask bundle silvertune-plugin --release
          cd target/bundled
          zip -r ../../${{ matrix.artifact }}.zip .

      - name: Build Windows plugin
        if: runner.os == 'Windows'
        run: |
          cargo xtask bundle silvertune-plugin --release
          cd target/bundled
          Compress-Archive -Path * -DestinationPath ../../${{ matrix.artifact }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Silvertune Plugin ${{ github.event.inputs.tag }}
          body: |
            ## Silvertune Plugin

            CLAP and VST3 autotune pitch correction plugin for [silvertune.live](https://silvertune.live).

            Each zip contains both `Silvertune.clap` and `Silvertune.vst3` bundles.

            ### Install

            **Linux** — extract to `~/.clap/` or `~/.vst3/`

            **macOS** — extract to `~/Library/Audio/Plug-Ins/CLAP/` or `~/Library/Audio/Plug-Ins/VST3/`

            **Windows** — extract to `%APPDATA%\CLAP\` or `C:\Program Files\Common Files\VST3\`

            ### Parameters

            | Parameter | Range | Description |
            |-----------|-------|-------------|
            | Key | C – B | Root key for scale lock |
            | Scale | Chromatic / Major / Minor | Scale mode |
            | Tune | 0–100% | Correction strength |
            | Wide | 0–100% | Doubler detune amount |
          files: |
            artifacts/silvertune-plugin-linux/silvertune-plugin-linux.zip
            artifacts/silvertune-plugin-macos/silvertune-plugin-macos.zip
            artifacts/silvertune-plugin-windows/silvertune-plugin-windows.zip
          fail_on_unmatched_files: false
