<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Silvertune</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06000a; color: #fff; font-family: 'Helvetica Neue', sans-serif;
         display: flex; flex-direction: column; align-items: center;
         justify-content: center; height: 100vh; gap: 32px; }

  #note { font-size: 96px; font-weight: 100; color: #ff6ec7;
          text-shadow: 0 0 40px #ff6ec7; letter-spacing: 0.05em; min-height: 110px; }
  #arrow { font-size: 14px; letter-spacing: 0.2em; color: rgba(196,111,255,0.6); height: 20px; }

  .row { display: flex; align-items: center; gap: 12px; }
  label { font-size: 11px; letter-spacing: 0.15em; color: rgba(255,255,255,0.35);
          text-transform: uppercase; width: 48px; text-align: right; }
  select { background: transparent; border: 1px solid rgba(255,110,199,0.2);
           color: rgba(255,110,199,0.7); font-size: 11px; padding: 3px 8px; outline: none; }
  select option { background: #1a0028; }
  input[type=range] { -webkit-appearance: none; width: 160px; height: 1px;
                      background: rgba(255,110,199,0.2); outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: #ff6ec7; cursor: pointer; box-shadow: 0 0 8px #ff6ec7; }

  #start { position: fixed; inset: 0; background: #06000a; display: flex;
           flex-direction: column; align-items: center; justify-content: center;
           gap: 16px; cursor: pointer; z-index: 10; }
  #start h1 { font-size: 52px; font-weight: 100; letter-spacing: 0.4em; color: #ff6ec7;
               text-shadow: 0 0 60px #ff6ec7; }
  #start p { font-size: 12px; letter-spacing: 0.2em; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div id="start">
  <h1>SILVERTUNE</h1>
  <p>CLICK TO BEGIN &nbsp;·&nbsp; USE HEADPHONES</p>
</div>

<div id="note">—</div>
<div id="arrow"></div>

<div class="row">
  <label>Key</label>
  <select id="sel-key">
    <option value="0">C</option><option value="1">C#</option>
    <option value="2">D</option><option value="3">D#</option>
    <option value="4">E</option><option value="5">F</option>
    <option value="6">F#</option><option value="7">G</option>
    <option value="8">G#</option><option value="9">A</option>
    <option value="10">A#</option><option value="11">B</option>
  </select>
</div>
<div class="row">
  <label>Scale</label>
  <select id="sel-scale">
    <option value="0">Chromatic</option>
    <option value="1" selected>Major</option>
    <option value="2">Minor</option>
  </select>
</div>
<div class="row">
  <label>Tune</label>
  <input type="range" id="sl-tune" min="0" max="100" value="100">
</div>

<script>
const KEYS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let workletNode;
let tune = 1.0, keyIdx = 0, scaleIdx = 1;

function send() {
  if (workletNode) workletNode.port.postMessage({ tune, keyIdx, scaleIdx });
}

document.getElementById('sl-tune').addEventListener('input', e => { tune = e.target.value/100; send(); });
document.getElementById('sel-key').addEventListener('change', e => { keyIdx = parseInt(e.target.value); send(); });
document.getElementById('sel-scale').addEventListener('change', e => { scaleIdx = parseInt(e.target.value); send(); });

document.getElementById('start').addEventListener('click', async () => {
  document.getElementById('start').remove();

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false,
    },
    video: false,
  });
  const actx = new AudioContext({ latencyHint: 'interactive', sampleRate: 48000 });
  const sr = actx.sampleRate;
  const source = actx.createMediaStreamSource(stream);

  await actx.audioWorklet.addModule('worklet.js');
  workletNode = new AudioWorkletNode(actx, 'silvertune-processor', {
    numberOfInputs: 1, numberOfOutputs: 1, outputChannelCount: [1],
  });

  workletNode.port.onmessage = (e) => {
    const { detectedNote, correctedNote } = e.data;
    if (correctedNote >= 0) {
      document.getElementById('note').textContent = KEYS[correctedNote % 12];
      document.getElementById('arrow').textContent =
        detectedNote !== correctedNote ? KEYS[detectedNote%12] + '  →  ' + KEYS[correctedNote%12] : '';
    }
  };
  send();

  source.connect(workletNode);
  workletNode.connect(actx.destination);
});
</script>
</body>
</html>
