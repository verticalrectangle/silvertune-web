<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Silvertune</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #06000a;
  overflow: hidden;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  user-select: none;
}

canvas {
  position: fixed; inset: 0; width: 100%; height: 100%;
  cursor: crosshair;
}

/* ── HUD ── */
#hud {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none; z-index: 2;
  gap: 6px;
}
#note-display {
  font-size: 128px; font-weight: 100; letter-spacing: 0.06em;
  color: #ff6ec7;
  text-shadow: 0 0 60px #ff6ec7, 0 0 140px rgba(255,110,199,0.25);
  min-height: 145px; line-height: 1;
  transition: color 0.15s, text-shadow 0.15s;
}
#arrow-display {
  font-size: 12px; letter-spacing: 0.25em;
  color: rgba(196,111,255,0.65); height: 18px;
}
#conf-bar-wrap {
  width: 120px; height: 2px;
  background: rgba(255,110,199,0.1);
  margin-top: 8px;
}
#conf-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #c46fff, #ff6ec7);
  transition: width 0.12s;
}

/* ── Bottom panel ── */
#panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 5;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 14px 20px 20px;
  background: linear-gradient(to top, rgba(6,0,10,0.92) 0%, transparent 100%);
}

/* Effect buttons */
#fx-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }

.fx-btn {
  background: transparent;
  border: 1px solid rgba(255,110,199,0.18);
  color: rgba(255,110,199,0.38);
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  padding: 5px 12px; cursor: pointer; transition: all 0.18s;
  font-family: inherit;
}
.fx-btn.on {
  background: rgba(255,110,199,0.1);
  border-color: rgba(255,110,199,0.6);
  color: #ff6ec7;
  box-shadow: 0 0 10px rgba(255,110,199,0.2), inset 0 0 6px rgba(255,110,199,0.04);
}
.fx-btn:hover { border-color: rgba(255,110,199,0.45); color: rgba(255,110,199,0.75); }

/* Param row */
#param-row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; justify-content: center; }
.ctl { display: flex; align-items: center; gap: 7px; }
label {
  font-size: 9px; letter-spacing: 0.18em;
  color: rgba(255,255,255,0.25); text-transform: uppercase;
}
select {
  background: transparent; border: 1px solid rgba(255,110,199,0.18);
  color: rgba(255,110,199,0.65); font-size: 10px; padding: 3px 7px;
  outline: none; font-family: inherit; cursor: pointer;
}
select option { background: #1a0028; }
input[type=range] {
  -webkit-appearance: none; width: 90px; height: 1px;
  background: rgba(255,110,199,0.18); outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px;
  border-radius: 50%; background: #ff6ec7; cursor: pointer;
  box-shadow: 0 0 6px #ff6ec7;
}

/* Action row */
#action-row { display: flex; gap: 10px; align-items: center; }
.act-btn {
  background: transparent; border: 1px solid rgba(196,111,255,0.28);
  color: rgba(196,111,255,0.55); font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; padding: 5px 16px; cursor: pointer;
  transition: all 0.18s; font-family: inherit;
}
.act-btn:hover { border-color: rgba(196,111,255,0.65); color: #c46fff; }
.act-btn.active {
  background: rgba(196,111,255,0.1);
  border-color: rgba(196,111,255,0.7);
  color: #c46fff;
}
#btn-rec.recording {
  border-color: #ff4455; color: #ff4455;
  animation: pulse-rec 1.1s ease-in-out infinite;
}
@keyframes pulse-rec {
  0%,100% { box-shadow: 0 0 8px rgba(255,68,85,0.3); }
  50%      { box-shadow: 0 0 20px rgba(255,68,85,0.7); }
}

/* ── Minimal mode ── */
body.minimal canvas { display: none; }
body.minimal #hud { background: rgba(6,0,10,0.96); }

/* ── Start screen ── */
#start {
  position: fixed; inset: 0; background: #06000a;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 22px; cursor: pointer; z-index: 30;
}
#start h1 {
  font-size: 64px; font-weight: 100; letter-spacing: 0.5em;
  color: #ff6ec7;
  text-shadow: 0 0 80px #ff6ec7, 0 0 200px rgba(255,110,199,0.15);
  animation: shimmer 3.5s ease-in-out infinite;
}
@keyframes shimmer {
  0%,100% { text-shadow: 0 0 80px #ff6ec7, 0 0 200px rgba(255,110,199,0.15); }
  50%      { text-shadow: 0 0 110px #ff6ec7, 0 0 260px rgba(255,110,199,0.3), 0 0 40px rgba(255,255,255,0.08); }
}
#start .sub { font-size: 11px; letter-spacing: 0.28em; color: rgba(255,255,255,0.18); }

/* ── Record modal ── */
#rec-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); z-index: 40;
  align-items: center; justify-content: center;
}
#rec-modal.open { display: flex; }
#rec-box {
  background: #0d0016; border: 1px solid rgba(255,110,199,0.25);
  padding: 36px 40px; display: flex; flex-direction: column; gap: 14px; min-width: 300px;
}
#rec-box h2 { font-size: 11px; letter-spacing: 0.3em; color: #ff6ec7; font-weight: 100; margin-bottom: 6px; }
.rec-opt {
  background: transparent; border: 1px solid rgba(196,111,255,0.25);
  color: rgba(196,111,255,0.65); font-size: 11px; letter-spacing: 0.15em;
  text-transform: uppercase; padding: 13px 18px; cursor: pointer;
  text-align: left; font-family: inherit; transition: all 0.18s;
}
.rec-opt:hover { border-color: #c46fff; color: #c46fff; background: rgba(196,111,255,0.06); }
.rec-opt span { font-size: 9px; color: rgba(255,255,255,0.3); display: block; margin-top: 3px; letter-spacing: 0.1em; }
.rec-cancel {
  font-size: 9px; letter-spacing: 0.18em; color: rgba(255,255,255,0.18);
  background: none; border: none; cursor: pointer; font-family: inherit;
  text-transform: uppercase; padding: 4px 0; margin-top: 4px;
}
.rec-cancel:hover { color: rgba(255,255,255,0.45); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div id="note-display">—</div>
  <div id="arrow-display"></div>
  <div id="conf-bar-wrap"><div id="conf-bar"></div></div>
</div>

<div id="start">
  <h1>SILVERTUNE</h1>
  <p class="sub">CLICK TO BEGIN &nbsp;·&nbsp; USE HEADPHONES</p>
</div>

<div id="panel">
  <div id="fx-bar">
    <button class="fx-btn on"  data-fx="orbs">Orbs</button>
    <button class="fx-btn on"  data-fx="rings">Rings</button>
    <button class="fx-btn on"  data-fx="sparks">Sparks</button>
    <button class="fx-btn"     data-fx="prism">Prism</button>
    <button class="fx-btn"     data-fx="hex">Hex</button>
    <button class="fx-btn"     data-fx="stars">Stars</button>
    <button class="fx-btn"     data-fx="ribbons">Ribbons</button>
    <button class="fx-btn"     data-fx="trails">Trails</button>
  </div>
  <div id="param-row">
    <div class="ctl"><label>Key</label>
      <select id="sel-key">
        <option value="0">C</option><option value="1">C#</option>
        <option value="2">D</option><option value="3">D#</option>
        <option value="4">E</option><option value="5">F</option>
        <option value="6">F#</option><option value="7">G</option>
        <option value="8">G#</option><option value="9">A</option>
        <option value="10">A#</option><option value="11">B</option>
      </select>
    </div>
    <div class="ctl"><label>Scale</label>
      <select id="sel-scale">
        <option value="0">Chromatic</option>
        <option value="1" selected>Major</option>
        <option value="2">Minor</option>
      </select>
    </div>
    <div class="ctl"><label>Tune</label>
      <input type="range" id="sl-tune" min="0" max="100" value="100">
    </div>
    <div class="ctl"><label>Wide</label>
      <input type="range" id="sl-wide" min="0" max="100" value="0">
    </div>
  </div>
  <div id="action-row">
    <button class="act-btn" id="btn-rec">● Rec</button>
    <button class="act-btn" id="btn-minimal">Minimal</button>
  </div>
</div>

<!-- Recording modal -->
<div id="rec-modal">
  <div id="rec-box">
    <h2>RECORD</h2>
    <button class="rec-opt" id="rec-video">
      Video + Audio
      <span>Canvas capture · WebM</span>
    </button>
    <button class="rec-opt" id="rec-audio">
      Audio Only
      <span>Tuned voice · WebM/Opus</span>
    </button>
    <button class="rec-cancel" id="rec-cancel-btn">Cancel</button>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const KEYS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Per-note hue — stays in pink/purple band (255–345)
const NOTE_HUE = [330, 315, 300, 285, 268, 285, 308, 322, 293, 272, 262, 342];

// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
window.addEventListener('resize', resize);
resize();

// ─── Audio state ──────────────────────────────────────────────────────────────
let workletNode, actx, audioDest;
let tune = 1.0, wide = 0.0, keyIdx = 0, scaleIdx = 1;
let currentNote = -1, prevNote = -1, amplitude = 0, smoothAmp = 0;
let isRunning = false;

// ─── FX toggles ───────────────────────────────────────────────────────────────
const FX = { orbs: true, rings: true, sparks: true, prism: false,
             hex: false, stars: false, ribbons: false, trails: false };

document.querySelectorAll('.fx-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = btn.dataset.fx;
    FX[k] = !FX[k];
    btn.classList.toggle('on', FX[k]);
  });
});

// ─── Color helpers ────────────────────────────────────────────────────────────
function hsl(note, s = 80, l = 68, a = 1) {
  return `hsla(${NOTE_HUE[((note % 12) + 12) % 12]}, ${s}%, ${l}%, ${a})`;
}
function anyHue() { return NOTE_HUE[currentNote >= 0 ? currentNote % 12 : 5]; }

// ─── Particle pool util ───────────────────────────────────────────────────────
function rnd(a, b) { return a + Math.random() * (b - a); }

// ─── Effect: Orbs (drifting bokeh circles) ────────────────────────────────────
const orbs = [];
function makeOrb(x, y) {
  return {
    x: x ?? rnd(0, W), y: y ?? rnd(0, H),
    r: rnd(12, 90),
    vx: rnd(-0.25, 0.25), vy: rnd(-0.35, -0.05),
    hue: rnd(260, 345),
    a: rnd(0.03, 0.11),
    pulse: rnd(0, Math.PI * 2), pulseV: rnd(0.004, 0.012),
    life: 1.0, decay: rnd(0.00015, 0.0004),
    flash: 0,
  };
}
function initOrbs() { for (let i = 0; i < 55; i++) orbs.push(makeOrb()); }

function tickOrbs() {
  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i];
    o.x += o.vx + Math.sin(o.pulse) * 0.18;
    o.y += o.vy - smoothAmp * 0.4;
    o.pulse += o.pulseV;
    o.flash = Math.max(0, o.flash - 0.06);
    o.life -= o.decay;
    if (o.life <= 0 || o.y < -120) { orbs.splice(i, 1); orbs.push(makeOrb()); }
  }
}
function drawOrbs() {
  for (const o of orbs) {
    const h = currentNote >= 0 ? NOTE_HUE[currentNote % 12] : o.hue;
    const scale = 1 + smoothAmp * 1.8 + o.flash;
    const r = o.r * scale;
    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);
    const alp = o.a * o.life * (1 + smoothAmp + o.flash * 0.5);
    g.addColorStop(0,   `hsla(${h},    85%, 80%, ${alp})`);
    g.addColorStop(0.45,`hsla(${h-18}, 72%, 62%, ${alp * 0.55})`);
    g.addColorStop(1,   `hsla(${h+12}, 60%, 50%, 0)`);
    ctx.beginPath();
    ctx.arc(o.x, o.y, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
}

// ─── Effect: Rings ────────────────────────────────────────────────────────────
const rings = [];
function spawnRing(note) {
  const h = NOTE_HUE[note % 12];
  const base = Math.min(W, H);
  rings.push({ x: cx, y: cy, r: 0,  speed: 4 + smoothAmp * 6, maxR: base * 0.65, h, a: 0.75, lw: 2 });
  rings.push({ x: cx, y: cy, r: 0,  speed: 2.5,                 maxR: base * 0.38, h, a: 0.45, lw: 1.2 });
  rings.push({ x: cx, y: cy, r: 0,  speed: 6 + smoothAmp * 8, maxR: base * 0.9,  h, a: 0.25, lw: 0.8 });
}
function tickRings() {
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];
    r.r += r.speed;
    r.a -= 0.011;
    if (r.a <= 0) rings.splice(i, 1);
  }
}
function drawRings() {
  for (const r of rings) {
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${r.h}, 90%, 78%, ${r.a})`;
    ctx.lineWidth = r.lw * (1 + smoothAmp * 0.5);
    ctx.stroke();
  }
}

// ─── Effect: Sparks ───────────────────────────────────────────────────────────
const sparks = [];
function spawnSparks(n, x, y) {
  const h = anyHue();
  const sx = x ?? cx, sy = y ?? H * 0.68;
  for (let i = 0; i < n; i++) {
    const angle = rnd(0, Math.PI * 2);
    const spd   = rnd(1, 3 + smoothAmp * 8);
    sparks.push({
      x: sx + rnd(-80, 80) * (x == null ? 1 : 0.3),
      y: sy + rnd(-30, 30) * (x == null ? 1 : 0.3),
      vx: Math.cos(angle) * spd * (x != null ? 1 : 0.7),
      vy: x != null ? Math.sin(angle) * spd : -spd - rnd(0, 3),
      r:  rnd(1.5, 4),
      h:  h + rnd(-20, 20),
      a:  0.95, decay: rnd(0.02, 0.04),
    });
  }
}
function tickSparks() {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.06; s.a -= s.decay;
    if (s.a <= 0) sparks.splice(i, 1);
  }
}
function drawSparks() {
  for (const s of sparks) {
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3.5);
    g.addColorStop(0, `hsla(${s.h}, 100%, 92%, ${s.a})`);
    g.addColorStop(1, `hsla(${s.h},  90%, 70%, 0)`);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 3.5, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
}

// ─── Effect: Prism (rotating beams) ──────────────────────────────────────────
let prismAngle = 0;
function drawPrism() {
  prismAngle += 0.003 + smoothAmp * 0.015;
  const beams = 8, len = Math.max(W, H) * 0.9;
  const h = anyHue();
  for (let i = 0; i < beams; i++) {
    const a = prismAngle + (i / beams) * Math.PI * 2;
    const ex = cx + Math.cos(a) * len, ey = cy + Math.sin(a) * len;
    const bh = (h + i * 18) % 360;
    const opacity = 0.05 + smoothAmp * 0.18;
    const g = ctx.createLinearGradient(cx, cy, ex, ey);
    g.addColorStop(0,   `hsla(${bh}, 90%, 75%, ${opacity})`);
    g.addColorStop(0.6, `hsla(${bh}, 80%, 65%, ${opacity * 0.4})`);
    g.addColorStop(1,   `hsla(${bh}, 70%, 55%, 0)`);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = g;
    ctx.lineWidth = 2.5 + smoothAmp * 10;
    ctx.stroke();
  }
}

// ─── Effect: Hex bokeh ────────────────────────────────────────────────────────
const hexes = [];
function makeHex(x, y) {
  return {
    x: x ?? rnd(0, W), y: y ?? rnd(0, H),
    r: rnd(14, 55),
    vx: rnd(-0.18, 0.18), vy: rnd(-0.18, -0.03),
    hue: rnd(260, 345),
    a: rnd(0.03, 0.09),
    rot: rnd(0, Math.PI), rotV: rnd(-0.004, 0.004),
    life: 1.0,
  };
}
function initHexes() { for (let i = 0; i < 28; i++) hexes.push(makeHex()); }
function hexPath(x, y, r, rot) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = rot + (i / 6) * Math.PI * 2;
    i === 0 ? ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r)
            : ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
  }
  ctx.closePath();
}
function tickHexes() {
  for (let i = hexes.length - 1; i >= 0; i--) {
    const h = hexes[i];
    h.x += h.vx; h.y += h.vy - smoothAmp * 0.3;
    h.rot += h.rotV;
    h.life -= 0.0003;
    if (h.life <= 0 || h.y < -80) { hexes.splice(i, 1); hexes.push(makeHex()); }
  }
}
function drawHexes() {
  for (const h of hexes) {
    const hue = currentNote >= 0 ? NOTE_HUE[currentNote % 12] : h.hue;
    const scale = 1 + smoothAmp * 1.5;
    hexPath(h.x, h.y, h.r * scale, h.rot);
    ctx.strokeStyle = `hsla(${hue}, 78%, 68%, ${h.a * h.life * scale})`;
    ctx.lineWidth = 1.3;
    ctx.stroke();
    ctx.fillStyle   = `hsla(${hue}, 70%, 58%, ${h.a * h.life * 0.25 * scale})`;
    ctx.fill();
  }
}

// ─── Effect: Star bokeh ───────────────────────────────────────────────────────
const starPtcls = [];
function makeStar(x, y) {
  return {
    x: x ?? rnd(0, W), y: y ?? rnd(0, H),
    r: rnd(10, 42),
    vx: rnd(-0.2, 0.2), vy: rnd(-0.2, -0.04),
    hue: rnd(260, 345),
    a: rnd(0.04, 0.12),
    rot: rnd(0, Math.PI), rotV: rnd(-0.003, 0.003),
    life: 1.0, spikes: Math.floor(rnd(4, 7)),
  };
}
function initStarPtcls() { for (let i = 0; i < 32; i++) starPtcls.push(makeStar()); }
function drawStarShape(x, y, r, spikes, rot, fill) {
  ctx.beginPath();
  const inner = r * 0.38;
  for (let i = 0; i < spikes * 2; i++) {
    const a = rot + (i / (spikes * 2)) * Math.PI * 2;
    const rad = i % 2 === 0 ? r : inner;
    i === 0 ? ctx.moveTo(x + Math.cos(a)*rad, y + Math.sin(a)*rad)
            : ctx.lineTo(x + Math.cos(a)*rad, y + Math.sin(a)*rad);
  }
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
}
function tickStars() {
  for (let i = starPtcls.length - 1; i >= 0; i--) {
    const s = starPtcls[i];
    s.x += s.vx; s.y += s.vy - smoothAmp * 0.25; s.rot += s.rotV;
    s.life -= 0.0003;
    if (s.life <= 0 || s.y < -80) { starPtcls.splice(i, 1); starPtcls.push(makeStar()); }
  }
}
function drawStarPtcls() {
  for (const s of starPtcls) {
    const hue = currentNote >= 0 ? NOTE_HUE[currentNote % 12] : s.hue;
    const scale = 1 + smoothAmp * 2;
    drawStarShape(s.x, s.y, s.r * scale, s.spikes, s.rot,
      `hsla(${hue}, 88%, 72%, ${s.a * s.life * scale})`);
  }
}

// ─── Effect: Ribbons ──────────────────────────────────────────────────────────
const ribbons = [];
let ribPhase = 0;
function tickRibbons() {
  ribPhase += 0.012 + smoothAmp * 0.04;
  if (ribbons.length < 6) {
    ribbons.push({ phase: ribPhase, offset: rnd(0, Math.PI*2), amp: rnd(80,200), hue: anyHue(), a: 0.0, life: 1 });
  }
  for (let i = ribbons.length - 1; i >= 0; i--) {
    const r = ribbons[i];
    r.a = Math.min(0.25, r.a + 0.004);
    r.phase += 0.008;
    r.life -= 0.0008;
    if (r.life <= 0) ribbons.splice(i, 1);
  }
}
function drawRibbons() {
  for (const r of ribbons) {
    const h = currentNote >= 0 ? NOTE_HUE[currentNote % 12] : r.hue;
    const steps = 120;
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const x = t * W;
      const y = cy + Math.sin(t * Math.PI * 3 + r.phase + r.offset) * r.amp * (1 + smoothAmp);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `hsla(${h}, 85%, 72%, ${r.a * r.life})`;
    ctx.lineWidth = 1.5 + smoothAmp * 3;
    ctx.stroke();
  }
}

// ─── Effect: Mouse trails ─────────────────────────────────────────────────────
const trailPts = [];
let mx = 0, my = 0;
canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
function tickTrails() {
  if (FX.trails && smoothAmp > 0.015) {
    trailPts.push({ x: mx, y: my, h: anyHue(), life: 1.0 });
  }
  for (let i = trailPts.length - 1; i >= 0; i--) {
    trailPts[i].life -= 0.025;
    if (trailPts[i].life <= 0) trailPts.splice(i, 1);
  }
}
function drawTrails() {
  for (const pt of trailPts) {
    const r = 10 * pt.life * (1 + smoothAmp * 1.5);
    const g = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, r * 2.5);
    g.addColorStop(0, `hsla(${pt.h}, 90%, 82%, ${pt.life * 0.55})`);
    g.addColorStop(1, `hsla(${pt.h}, 80%, 65%, 0)`);
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
  }
}

// ─── Click burst ──────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  if (!isRunning) return;
  const x = e.clientX, y = e.clientY;
  // radial burst of sparks
  spawnSparks(28, x, y);
  // a ring at click point
  rings.push({ x, y, r: 0, speed: 5, maxR: 220, h: anyHue(), a: 0.85, lw: 2 });
  // flash nearest orb or create one
  if (FX.orbs) {
    const o = makeOrb(x, y);
    o.r = rnd(50, 100); o.a = 0.2; o.decay = 0.008; o.flash = 0.8;
    orbs.push(o);
  }
  if (FX.hex) {
    const h = makeHex(x, y);
    h.r = rnd(35, 70); h.a = 0.22; hexes.push(h);
  }
  if (FX.stars) {
    const s = makeStar(x, y);
    s.r = rnd(28, 60); s.a = 0.25; starPtcls.push(s);
  }
});

// ─── Render loop ──────────────────────────────────────────────────────────────
function render() {
  requestAnimationFrame(render);

  // Smooth amplitude
  smoothAmp += (amplitude - smoothAmp) * 0.15;

  if (!isRunning) return;

  // Trail fade — less opacity = longer trails
  const trailAlpha = FX.trails ? 0.10 : FX.ribbons ? 0.12 : 0.16;
  ctx.fillStyle = `rgba(6, 0, 10, ${trailAlpha})`;
  ctx.fillRect(0, 0, W, H);

  // ── Draw layers ──
  if (FX.prism)   { drawPrism(); }
  if (FX.ribbons) { tickRibbons(); drawRibbons(); }
  if (FX.orbs)    { tickOrbs();   drawOrbs(); }
  if (FX.hex)     { tickHexes();  drawHexes(); }
  if (FX.stars)   { tickStars();  drawStarPtcls(); }
  if (FX.rings)   { tickRings();  drawRings(); }
  if (FX.sparks && smoothAmp > 0.008) {
    spawnSparks(Math.ceil(smoothAmp * 7));
  }
  tickSparks(); drawSparks();
  tickTrails(); drawTrails();

  // Center ambient glow when singing
  if (smoothAmp > 0.008) {
    const h = anyHue();
    const radius = 250 + smoothAmp * 350;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    g.addColorStop(0, `hsla(${h}, 90%, 70%, ${smoothAmp * 0.12})`);
    g.addColorStop(1, `hsla(${h}, 80%, 50%, 0)`);
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
  }
}

// ─── Worklet messages ─────────────────────────────────────────────────────────
function onWorkletMsg(e) {
  const { detectedNote: dn, correctedNote: cn, rms } = e.data;
  amplitude = Math.min(1, (rms ?? 0) * 8);

  if (cn >= 0) {
    const note = cn % 12;
    const det  = dn % 12;
    currentNote = note;

    const noteEl  = document.getElementById('note-display');
    const arrowEl = document.getElementById('arrow-display');
    const h = NOTE_HUE[note];
    noteEl.textContent = KEYS[note];
    noteEl.style.color      = `hsl(${h}, 85%, 70%)`;
    noteEl.style.textShadow = `0 0 60px hsl(${h},85%,70%), 0 0 130px hsla(${h},85%,70%,0.25)`;

    arrowEl.textContent = dn !== cn ? `${KEYS[det]}  →  ${KEYS[note]}` : '';

    document.getElementById('conf-bar').style.width = `${Math.min(100, amplitude * 100)}%`;

    if (cn !== prevNote) {
      prevNote = cn;
      if (FX.rings) spawnRing(note);
      // flash nearby orbs
      if (FX.orbs) orbs.forEach(o => { o.flash = 0.5 + Math.random() * 0.3; });
    }
  }
}

// ─── Param controls ───────────────────────────────────────────────────────────
function sendParams() {
  if (workletNode) workletNode.port.postMessage({ tune, keyIdx, scaleIdx });
}

document.getElementById('sl-tune').addEventListener('input', e => {
  tune = e.target.value / 100; sendParams();
});
document.getElementById('sl-wide').addEventListener('input', e => {
  wide = e.target.value / 100;
  if (workletNode) workletNode.port.postMessage({ wide });
});
document.getElementById('sel-key').addEventListener('change', e => {
  keyIdx = parseInt(e.target.value); sendParams();
});
document.getElementById('sel-scale').addEventListener('change', e => {
  scaleIdx = parseInt(e.target.value); sendParams();
});
document.addEventListener('keydown', e => {
  if ((e.key === 'b' || e.key === 'B') && workletNode)
    workletNode.port.postMessage({ bypass: true });
});
document.addEventListener('keyup', e => {
  if ((e.key === 'b' || e.key === 'B') && workletNode)
    workletNode.port.postMessage({ bypass: false });
});

// Minimal mode
document.getElementById('btn-minimal').addEventListener('click', () => {
  const on = document.body.classList.toggle('minimal');
  const btn = document.getElementById('btn-minimal');
  btn.textContent = on ? 'Visualize' : 'Minimal';
  btn.classList.toggle('active', on);
});

// ─── Recording ────────────────────────────────────────────────────────────────
let recorder = null, recChunks = [], recType = null;
let isRecording = false;

document.getElementById('btn-rec').addEventListener('click', () => {
  isRecording ? stopRecording() : document.getElementById('rec-modal').classList.add('open');
});
document.getElementById('rec-cancel-btn').addEventListener('click', () => {
  document.getElementById('rec-modal').classList.remove('open');
});
document.getElementById('rec-video').addEventListener('click', () => {
  document.getElementById('rec-modal').classList.remove('open');
  startRecording('video');
});
document.getElementById('rec-audio').addEventListener('click', () => {
  document.getElementById('rec-modal').classList.remove('open');
  startRecording('audio');
});

function startRecording(type) {
  if (!actx || !audioDest) return;
  recType = type; recChunks = [];

  let stream;
  if (type === 'video') {
    const cv = canvas.captureStream(30);
    stream = new MediaStream([...cv.getTracks(), ...audioDest.stream.getTracks()]);
  } else {
    stream = audioDest.stream;
  }

  // pick best available mime
  const candidates = type === 'video'
    ? ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm']
    : ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg'];
  const mime = candidates.find(m => MediaRecorder.isTypeSupported(m)) || '';

  recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
  recorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  recorder.onstop = () => downloadRec(type);
  recorder.start(200);

  isRecording = true;
  const btn = document.getElementById('btn-rec');
  btn.textContent = '■ Stop'; btn.classList.add('recording');
}

function stopRecording() {
  recorder?.stop();
  isRecording = false;
  const btn = document.getElementById('btn-rec');
  btn.textContent = '● Rec'; btn.classList.remove('recording');
}

function downloadRec(type) {
  const ext  = type === 'video' ? 'webm' : 'webm';
  const blob = new Blob(recChunks, { type: type === 'video' ? 'video/webm' : 'audio/webm' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `silvertune-${Date.now()}.${ext}`;
  a.click(); URL.revokeObjectURL(url);
}

// ─── Start ────────────────────────────────────────────────────────────────────
document.getElementById('start').addEventListener('click', async () => {
  document.getElementById('start').remove();

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
    video: false,
  });

  actx = new AudioContext({ latencyHint: 'interactive', sampleRate: 48000 });
  const source = actx.createMediaStreamSource(stream);

  await actx.audioWorklet.addModule('worklet.js');
  workletNode = new AudioWorkletNode(actx, 'silvertune-processor', {
    numberOfInputs: 1, numberOfOutputs: 1, outputChannelCount: [1],
  });

  workletNode.port.onmessage = onWorkletMsg;
  sendParams();

  audioDest = actx.createMediaStreamDestination();
  source.connect(workletNode);
  workletNode.connect(actx.destination);
  workletNode.connect(audioDest);

  initOrbs(); initHexes(); initStarPtcls();
  isRunning = true;
});

render();
</script>
