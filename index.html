<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Silvertune</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080a0e;
  overflow: hidden;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  user-select: none;
}

canvas { position: fixed; inset: 0; width: 100%; height: 100%; cursor: crosshair; }

/* ── HUD ── */
#hud {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none; z-index: 2; gap: 6px;
  padding-bottom: 220px;
}
#note-display {
  font-size: 128px; font-weight: 100; letter-spacing: 0.06em;
  color: #dde6f5;
  text-shadow: 0 0 60px #dde6f5, 0 0 140px rgba(210,224,245,0.25);
  min-height: 145px; line-height: 1;
  transition: color 0.15s, text-shadow 0.15s;
}
#arrow-display {
  font-size: 12px; letter-spacing: 0.25em;
  color: rgba(175,195,225,0.65); height: 18px;
}
#conf-bar-wrap { width: 100px; height: 1px; background: rgba(200,215,240,0.1); margin-top: 10px; }
#conf-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #8aaac8, #dde6f5); transition: width 0.1s; }

/* ── XMB ── */
#xmb {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 5;
  display: flex; flex-direction: column; align-items: center;
  padding-bottom: 28px;
  background: linear-gradient(to top, rgba(5,7,12,0.97) 0%, rgba(5,7,12,0.72) 55%, transparent 100%);
}

/* Sub-item area */
#xmb-sub {
  display: flex; align-items: flex-end; min-height: 110px;
  width: 100%; justify-content: center; gap: 10px;
  padding: 0 32px 18px; overflow: visible;
}
.sub-panel { display: none; }
.sub-panel.visible { display: contents; }

/* FX toggle items */
.xitem {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  cursor: pointer; min-width: 76px; transition: opacity 0.15s;
  will-change: transform, opacity;
}
.xitem-icon {
  width: 60px; height: 60px;
  border: 1px solid rgba(255,255,255,0.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: rgba(255,255,255,0.65);
  transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
}
.xitem.on .xitem-icon {
  border-color: #fff;
  color: #fff;
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 18px rgba(255,255,255,0.25), inset 0 0 8px rgba(255,255,255,0.06);
}
.xitem:hover .xitem-icon { border-color: rgba(255,255,255,0.7); color: #fff; }
.xitem-label { font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.55); text-transform: uppercase; }
.xitem.on .xitem-label { color: #fff; }

/* SOUND controls */
.sound-row {
  display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
  justify-content: center; padding: 14px 0;
}
.s-ctl { display: flex; align-items: center; gap: 10px; }
label { font-size: 12px; letter-spacing: 0.16em; color: rgba(255,255,255,0.6); text-transform: uppercase; }
select {
  background: transparent; border: 1px solid rgba(200,215,240,0.2);
  color: rgba(200,215,240,0.65); font-size: 13px; padding: 5px 10px;
  outline: none; font-family: inherit; cursor: pointer;
}
select option { background: #0d1018; }
input[type=range] {
  -webkit-appearance: none; width: 110px; height: 2px;
  background: rgba(200,215,240,0.2); outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: #dde6f5; cursor: pointer;
  box-shadow: 0 0 8px #dde6f5;
}

/* REC items */
.xrec-row { display: flex; gap: 18px; align-items: flex-end; padding: 14px 0; }
.xrec-item {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  cursor: pointer; min-width: 80px; will-change: transform;
}
.xrec-icon {
  width: 60px; height: 60px;
  border: 1px solid rgba(255,255,255,0.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: rgba(255,255,255,0.65);
  transition: all 0.15s;
}
.xrec-icon:hover, .xrec-item:hover .xrec-icon { border-color: rgba(255,255,255,0.7); color: #fff; }
.xrec-icon.active-mode {
  border-color: #fff; color: #fff;
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 16px rgba(255,255,255,0.2);
}
.xrec-icon.recording { border-color: #ff4455; color: #ff4455; animation: pulse-rec 1.1s ease-in-out infinite; }
@keyframes pulse-rec {
  0%,100% { box-shadow: 0 0 8px rgba(255,68,85,0.3); }
  50%      { box-shadow: 0 0 22px rgba(255,68,85,0.65); }
}
.xrec-label { font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.55); text-transform: uppercase; }

/* XMB category bar */
#xmb-cats { display: flex; gap: 72px; align-items: flex-end; height: 68px; margin-top: 8px; }
.xcat {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer;
}
.xcat-icon {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: rgba(255,255,255,0.6);
  transition: color 0.2s;
  will-change: transform;
}
.xcat.active .xcat-icon { color: #fff; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
.xcat-label { font-size: 11px; letter-spacing: 0.18em; color: rgba(255,255,255,0.55); text-transform: uppercase; transition: color 0.2s; }
.xcat.active .xcat-label { color: #fff; }
/* active cat underline */
.xcat.active::after {
  content: ''; position: absolute; bottom: -6px;
  width: 44px; height: 1px; background: rgba(200,215,240,0.4);
}
.xcat { position: relative; }

/* ── Minimal ── */
body.minimal canvas { display: none; }

/* ── Start ── */
#start {
  position: fixed; inset: 0; background: #080a0e;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 22px; cursor: pointer; z-index: 30;
}
#start h1 {
  font-size: 64px; font-weight: 100; letter-spacing: 0.5em; color: #dde6f5;
  text-shadow: 0 0 80px #dde6f5, 0 0 200px rgba(210,224,245,0.15);
  animation: shimmer 3.5s ease-in-out infinite;
}
@keyframes shimmer {
  0%,100% { text-shadow: 0 0 80px #dde6f5, 0 0 200px rgba(210,224,245,0.15); }
  50%      { text-shadow: 0 0 110px #dde6f5, 0 0 260px rgba(210,224,245,0.3), 0 0 40px rgba(255,255,255,0.12); }
}
#start .sub { font-size: 11px; letter-spacing: 0.28em; color: rgba(255,255,255,0.18); }

/* ── Record modal ── */
#rec-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 40; align-items: center; justify-content: center; }
#rec-modal.open { display: flex; }
#rec-box { background: #0d1018; border: 1px solid rgba(200,215,240,0.25); padding: 36px 40px; display: flex; flex-direction: column; gap: 14px; min-width: 300px; }
#rec-box h2 { font-size: 11px; letter-spacing: 0.3em; color: #dde6f5; font-weight: 100; margin-bottom: 6px; }
.rec-opt {
  background: transparent; border: 1px solid rgba(175,195,225,0.25);
  color: rgba(175,195,225,0.65); font-size: 11px; letter-spacing: 0.15em;
  text-transform: uppercase; padding: 13px 18px; cursor: pointer;
  text-align: left; font-family: inherit; transition: all 0.18s;
}
.rec-opt:hover { border-color: #b0c8e4; color: #b0c8e4; background: rgba(175,195,225,0.06); }
.rec-opt span { font-size: 9px; color: rgba(255,255,255,0.28); display: block; margin-top: 3px; letter-spacing: 0.1em; }
.rec-cancel { font-size: 9px; letter-spacing: 0.18em; color: rgba(255,255,255,0.18); background: none; border: none; cursor: pointer; font-family: inherit; text-transform: uppercase; padding: 4px 0; margin-top: 4px; }
.rec-cancel:hover { color: rgba(255,255,255,0.45); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div id="note-display">—</div>
  <div id="arrow-display"></div>
  <div id="conf-bar-wrap"><div id="conf-bar"></div></div>
</div>

<div id="start">
  <h1>SILVERTUNE</h1>
  <p class="sub">CLICK TO BEGIN &nbsp;·&nbsp; USE HEADPHONES</p>
</div>

<div id="xmb">
  <div id="xmb-sub">

    <!-- FX panel -->
    <div id="sub-fx" class="sub-panel visible"></div>

    <!-- SOUND panel -->
    <div id="sub-sound" class="sub-panel">
      <div class="sound-row">
        <div class="s-ctl"><label>Key</label>
          <select id="sel-key">
            <option value="0">C</option><option value="1">C#</option>
            <option value="2">D</option><option value="3">D#</option>
            <option value="4">E</option><option value="5">F</option>
            <option value="6">F#</option><option value="7">G</option>
            <option value="8">G#</option><option value="9">A</option>
            <option value="10">A#</option><option value="11">B</option>
          </select>
        </div>
        <div class="s-ctl"><label>Scale</label>
          <select id="sel-scale">
            <option value="0">Chromatic</option>
            <option value="1" selected>Major</option>
            <option value="2">Minor</option>
          </select>
        </div>
        <div class="s-ctl"><label>Tune</label>
          <input type="range" id="sl-tune" min="0" max="100" value="100">
        </div>
        <div class="s-ctl"><label>Wide</label>
          <input type="range" id="sl-wide" min="0" max="100" value="0">
        </div>
      </div>
    </div>

    <!-- REC panel -->
    <div id="sub-rec" class="sub-panel">
      <div class="xrec-row">
        <div class="xrec-item" id="ritem-video">
          <div class="xrec-icon" id="ricon-video">▶</div>
          <div class="xrec-label">Video</div>
        </div>
        <div class="xrec-item" id="ritem-audio">
          <div class="xrec-icon" id="ricon-audio">◉</div>
          <div class="xrec-label">Audio</div>
        </div>
        <div class="xrec-item" id="ritem-minimal">
          <div class="xrec-icon" id="ricon-minimal">▣</div>
          <div class="xrec-label">Minimal</div>
        </div>
      </div>
    </div>

  </div>

  <div id="xmb-cats">
    <div class="xcat active" data-cat="0"><div class="xcat-icon">✦</div><div class="xcat-label">FX</div></div>
    <div class="xcat"        data-cat="1"><div class="xcat-icon">◎</div><div class="xcat-label">Sound</div></div>
    <div class="xcat"        data-cat="2"><div class="xcat-icon">●</div><div class="xcat-label">Rec</div></div>
  </div>
</div>

<div id="rec-modal">
  <div id="rec-box">
    <h2>RECORD</h2>
    <button class="rec-opt" id="rec-start-video">Video + Audio<span>Canvas · WebM</span></button>
    <button class="rec-opt" id="rec-start-audio">Audio Only<span>Tuned voice · WebM/Opus</span></button>
    <button class="rec-cancel" id="rec-cancel-btn">Cancel</button>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const KEYS     = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_HUE = [215,212,210,218,207,213,216,210,214,208,212,217];
const FX_DEFS  = [
  { key:'orbs',    label:'Orbs',    icon:'◉',  def:true  },
  { key:'rings',   label:'Rings',   icon:'◎',  def:true  },
  { key:'sparks',  label:'Sparks',  icon:'✦',  def:true  },
  { key:'prism',   label:'Prism',   icon:'⊕',  def:false },
  { key:'hex',     label:'Hex',     icon:'⬡',  def:false },
  { key:'stars',   label:'Stars',   icon:'★',  def:false },
  { key:'ribbons', label:'Ribbons', icon:'〜', def:false },
  { key:'trails',  label:'Trails',  icon:'∿',  def:false },
];

// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, cx, cy;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; cx = W/2; cy = H/2; }
window.addEventListener('resize', resize);
resize();

// ─── Audio state ──────────────────────────────────────────────────────────────
let workletNode, actx, audioDest;
let tune=1.0, wide=0.0, keyIdx=0, scaleIdx=1;
let currentNote=-1, prevNote=-1, amplitude=0, smoothAmp=0;
let isCorrecting = false;
let isRunning = false;

// ─── FX ───────────────────────────────────────────────────────────────────────
const FX = {};
FX_DEFS.forEach(d => FX[d.key] = d.def);

// ─── XMB ──────────────────────────────────────────────────────────────────────
let xmbActiveCat = 0;
let xmbFxSel = 0;
let xmbTime = 0;

// Build FX items
const subFx = document.getElementById('sub-fx');
FX_DEFS.forEach((def, i) => {
  const el = document.createElement('div');
  el.className = 'xitem' + (FX[def.key] ? ' on' : '');
  el.dataset.idx = i;
  el.innerHTML = `<div class="xitem-icon">${def.icon}</div><div class="xitem-label">${def.label}</div>`;
  el.addEventListener('click', () => {
    FX[def.key] = !FX[def.key];
    el.classList.toggle('on', FX[def.key]);
    xmbFxSel = i;
  });
  el.addEventListener('mouseenter', () => { xmbFxSel = i; });
  subFx.appendChild(el);
});

// Category switching
document.querySelectorAll('.xcat').forEach(cat => {
  cat.addEventListener('click', () => {
    xmbActiveCat = parseInt(cat.dataset.cat);
    document.querySelectorAll('.xcat').forEach(c => c.classList.remove('active'));
    cat.classList.add('active');
    document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('visible'));
    ['sub-fx','sub-sound','sub-rec'][xmbActiveCat] &&
      document.getElementById(['sub-fx','sub-sound','sub-rec'][xmbActiveCat]).classList.add('visible');
  });
});

function tickXmb() {}

// ─── Note center helper ───────────────────────────────────────────────────────
function noteCenter() {
  const r = document.getElementById('note-display').getBoundingClientRect();
  return { x: r.left + r.width * 0.5, y: r.top + r.height * 0.5 };
}

// ─── Color helpers ────────────────────────────────────────────────────────────
function anyHue() { return NOTE_HUE[((currentNote % 12) + 12) % 12] || 212; }
function rnd(a, b) { return a + Math.random() * (b - a); }

// ─── Background blobs ────────────────────────────────────────────────────────
let bgT = 0;
const BG_BLOBS = [
  { xf:0.22, yf:0.17, xa:0.44, ya:0.38, ph:0.0, h:210, s:28, l:82, r:0.80 },
  { xf:0.14, yf:0.29, xa:0.38, ya:0.44, ph:2.1, h:220, s:18, l:92, r:0.70 },
  { xf:0.31, yf:0.21, xa:0.34, ya:0.32, ph:4.2, h:200, s:35, l:75, r:0.60 },
  { xf:0.19, yf:0.36, xa:0.40, ya:0.30, ph:1.5, h:215, s:12, l:95, r:0.65 },
  { xf:0.27, yf:0.13, xa:0.30, ya:0.42, ph:3.5, h:205, s:40, l:70, r:0.55 },
  { xf:0.11, yf:0.25, xa:0.45, ya:0.35, ph:5.1, h:225, s:22, l:88, r:0.72 },
];
function drawBg() {
  bgT += 0.006;
  for (const b of BG_BLOBS) {
    const bx = cx + Math.sin(bgT * b.xf + b.ph)          * W * b.xa;
    const by = cy + Math.cos(bgT * b.yf + b.ph + 1.3)    * H * b.ya;
    const br = Math.min(W, H) * b.r * (1 + smoothAmp * 0.7);
    const op = 0.20 + smoothAmp * 0.18;
    const g  = ctx.createRadialGradient(bx, by, 0, bx, by, br);
    g.addColorStop(0,   `hsla(${b.h}, ${b.s}%,   ${b.l}%,   ${op})`);
    g.addColorStop(0.45,`hsla(${b.h}, ${b.s*.7}%, ${b.l*.88}%, ${op * 0.55})`);
    g.addColorStop(1,   `hsla(${b.h}, ${b.s*.3}%, ${b.l*.7}%,  0)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── Orbs ─────────────────────────────────────────────────────────────────────
const orbs = [];
function makeOrb(x, y) {
  return { x: x??rnd(0,W), y: y??rnd(0,H), r:rnd(12,88),
    vx:rnd(-0.25,0.25), vy:rnd(-0.35,-0.05), hue:rnd(205,225),
    a:rnd(0.03,0.1), pulse:rnd(0,Math.PI*2), pulseV:rnd(0.005,0.013),
    life:1.0, decay:rnd(0.00015,0.0004), flash:0 };
}
function initOrbs() { for (let i=0;i<55;i++) orbs.push(makeOrb()); }
function tickOrbs() {
  for (let i=orbs.length-1;i>=0;i--) {
    const o=orbs[i];
    o.x += o.vx + Math.sin(o.pulse)*0.18;
    o.y += o.vy - smoothAmp*0.4;
    o.pulse += o.pulseV;
    o.flash  = Math.max(0, o.flash - 0.055);
    o.life  -= o.decay;
    if (o.life<=0||o.y<-130) { orbs.splice(i,1); orbs.push(makeOrb()); }
  }
}
function drawOrbs() {
  for (const o of orbs) {
    const h = currentNote>=0 ? NOTE_HUE[currentNote%12] : o.hue;
    const sc = 1 + smoothAmp*1.8 + o.flash;
    const r  = o.r * sc;
    const al = o.a * o.life * sc;
    const g  = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,r);
    g.addColorStop(0,   `hsla(${h},    16%, 90%, ${al})`);
    g.addColorStop(0.45,`hsla(${h-5},  12%, 78%, ${al*0.5})`);
    g.addColorStop(1,   `hsla(${h+5},   8%, 65%, 0)`);
    ctx.beginPath(); ctx.arc(o.x,o.y,r,0,Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
  }
}

// ─── Rings (centered on note letter) ─────────────────────────────────────────
const rings = [];
function spawnRing(note) {
  const { x, y } = noteCenter();
  const h    = NOTE_HUE[note%12];
  rings.push({ x, y, r:0, speed:4+smoothAmp*6, h, a:0.78, lw:2 });
  rings.push({ x, y, r:0, speed:2.8,           h, a:0.45, lw:1.2 });
  rings.push({ x, y, r:0, speed:6+smoothAmp*8, h, a:0.22, lw:0.8 });
}
function tickRings() {
  for (let i=rings.length-1;i>=0;i--) {
    const r=rings[i]; r.r+=r.speed; r.a-=0.011;
    if (r.a<=0) rings.splice(i,1);
  }
}
function drawRings() {
  for (const r of rings) {
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    ctx.strokeStyle = `hsla(${r.h},18%,88%,${r.a})`;
    ctx.lineWidth   = r.lw*(1+smoothAmp*0.5); ctx.stroke();
  }
}

// ─── Sparks (only on pitch correction) ───────────────────────────────────────
const sparks = [];
function spawnSparks(n, x, y) {
  const h  = anyHue();
  const sx = x??cx, sy = y??(H*0.66);
  for (let i=0;i<n;i++) {
    const angle = rnd(0,Math.PI*2);
    const spd   = rnd(1, 3+smoothAmp*7);
    sparks.push({
      x: sx + rnd(-90,90)*(x==null?1:0.25),
      y: sy + rnd(-30,30)*(x==null?1:0.25),
      vx: Math.cos(angle)*spd*(x!=null?1:0.6),
      vy: x!=null ? Math.sin(angle)*spd : -spd - rnd(0,3),
      r: rnd(1.5,4), h: h+rnd(-8,8), a:0.95, decay:rnd(0.02,0.04),
    });
  }
}
function tickSparks() {
  for (let i=sparks.length-1;i>=0;i--) {
    const s=sparks[i];
    s.x+=s.vx; s.y+=s.vy; s.vy+=0.06; s.a-=s.decay;
    if (s.a<=0) sparks.splice(i,1);
  }
}
function drawSparks() {
  for (const s of sparks) {
    const g = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3.5);
    g.addColorStop(0,`hsla(${s.h},12%,96%,${s.a})`);
    g.addColorStop(1,`hsla(${s.h}, 8%,82%, 0)`);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*3.5,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }
}

// ─── Prism ────────────────────────────────────────────────────────────────────
let prismAngle = 0;
function drawPrism() {
  prismAngle += 0.003 + smoothAmp*0.014;
  const beams=8, len=Math.max(W,H)*0.92, h=anyHue();
  for (let i=0;i<beams;i++) {
    const a  = prismAngle + (i/beams)*Math.PI*2;
    const ex = cx+Math.cos(a)*len, ey=cy+Math.sin(a)*len;
    const bh = (h+i*6)%360;
    const op = 0.055+smoothAmp*0.18;
    const g  = ctx.createLinearGradient(cx,cy,ex,ey);
    g.addColorStop(0,  `hsla(${bh},14%,88%,${op})`);
    g.addColorStop(0.6,`hsla(${bh},10%,78%,${op*0.35})`);
    g.addColorStop(1,  `hsla(${bh}, 8%,65%,0)`);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ex,ey);
    ctx.strokeStyle=g; ctx.lineWidth=2.5+smoothAmp*10; ctx.stroke();
  }
}

// ─── Hex bokeh ────────────────────────────────────────────────────────────────
const hexes = [];
function makeHex(x,y) {
  return { x:x??rnd(0,W), y:y??rnd(0,H), r:rnd(13,54),
    vx:rnd(-0.18,0.18), vy:rnd(-0.18,-0.03), hue:rnd(205,225),
    a:rnd(0.03,0.09), rot:rnd(0,Math.PI), rotV:rnd(-0.004,0.004), life:1.0 };
}
function initHexes() { for (let i=0;i<28;i++) hexes.push(makeHex()); }
function tickHexes() {
  for (let i=hexes.length-1;i>=0;i--) {
    const h=hexes[i]; h.x+=h.vx; h.y+=h.vy-smoothAmp*0.3; h.rot+=h.rotV; h.life-=0.0003;
    if (h.life<=0||h.y<-80) { hexes.splice(i,1); hexes.push(makeHex()); }
  }
}
function drawHexPath(x,y,r,rot) {
  ctx.beginPath();
  for (let i=0;i<6;i++) {
    const a=rot+(i/6)*Math.PI*2;
    i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
  }
  ctx.closePath();
}
function drawHexes() {
  for (const h of hexes) {
    const hue=currentNote>=0?NOTE_HUE[currentNote%12]:h.hue;
    const sc=1+smoothAmp*1.5;
    drawHexPath(h.x,h.y,h.r*sc,h.rot);
    ctx.strokeStyle=`hsla(${hue},14%,84%,${h.a*h.life*sc})`; ctx.lineWidth=1.3; ctx.stroke();
    ctx.fillStyle  =`hsla(${hue},10%,72%,${h.a*h.life*0.22*sc})`; ctx.fill();
  }
}

// ─── Stars ────────────────────────────────────────────────────────────────────
const starPtcls = [];
function makeStar(x,y) {
  return { x:x??rnd(0,W), y:y??rnd(0,H), r:rnd(10,42),
    vx:rnd(-0.2,0.2), vy:rnd(-0.2,-0.04), hue:rnd(205,225),
    a:rnd(0.04,0.12), rot:rnd(0,Math.PI), rotV:rnd(-0.003,0.003),
    life:1.0, spikes:Math.floor(rnd(4,7)) };
}
function initStarPtcls() { for (let i=0;i<32;i++) starPtcls.push(makeStar()); }
function tickStars() {
  for (let i=starPtcls.length-1;i>=0;i--) {
    const s=starPtcls[i]; s.x+=s.vx; s.y+=s.vy-smoothAmp*0.25; s.rot+=s.rotV; s.life-=0.0003;
    if (s.life<=0||s.y<-80) { starPtcls.splice(i,1); starPtcls.push(makeStar()); }
  }
}
function drawStarShape(x,y,r,sp,rot,fill) {
  const inner=r*0.38; ctx.beginPath();
  for (let i=0;i<sp*2;i++) {
    const a=rot+(i/(sp*2))*Math.PI*2, rad=i%2===0?r:inner;
    i===0?ctx.moveTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad):ctx.lineTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad);
  }
  ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
}
function drawStarPtcls() {
  for (const s of starPtcls) {
    const hue=currentNote>=0?NOTE_HUE[currentNote%12]:s.hue;
    const sc=1+smoothAmp*2;
    drawStarShape(s.x,s.y,s.r*sc,s.spikes,s.rot,`hsla(${hue},14%,88%,${s.a*s.life*sc})`);
  }
}

// ─── Ribbons ──────────────────────────────────────────────────────────────────
const ribbons = [];
let ribPhase = 0;
function tickRibbons() {
  ribPhase += 0.014 + smoothAmp*0.04;
  while (ribbons.length < 6) ribbons.push({ phase:ribPhase, off:rnd(0,Math.PI*2), amp:rnd(70,190), hue:anyHue(), a:0.0, life:1.0 });
  for (let i=ribbons.length-1;i>=0;i--) {
    const r=ribbons[i]; r.a=Math.min(0.28,r.a+0.005); r.phase+=0.009; r.life-=0.0008;
    if (r.life<=0) ribbons.splice(i,1);
  }
}
function drawRibbons() {
  for (const r of ribbons) {
    const h=currentNote>=0?NOTE_HUE[currentNote%12]:r.hue;
    ctx.beginPath();
    for (let i=0;i<=120;i++) {
      const t=i/120, x=t*W;
      const y=cy+Math.sin(t*Math.PI*3+r.phase+r.off)*r.amp*(1+smoothAmp);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`hsla(${h},14%,82%,${r.a*r.life})`; ctx.lineWidth=1.5+smoothAmp*3; ctx.stroke();
  }
}

// ─── Mouse trails ─────────────────────────────────────────────────────────────
const trailPts = [];
let mx=0, my=0;
canvas.addEventListener('mousemove', e=>{mx=e.clientX;my=e.clientY;});
function tickTrails() {
  if (FX.trails && smoothAmp>0.012) trailPts.push({x:mx,y:my,h:anyHue(),life:1.0});
  for (let i=trailPts.length-1;i>=0;i--) { trailPts[i].life-=0.025; if(trailPts[i].life<=0) trailPts.splice(i,1); }
}
function drawTrails() {
  for (const pt of trailPts) {
    const r=10*pt.life*(1+smoothAmp*1.5);
    const g=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,r*2.5);
    g.addColorStop(0,`hsla(${pt.h},16%,92%,${pt.life*0.55})`);
    g.addColorStop(1,`hsla(${pt.h},10%,75%,0)`);
    ctx.beginPath(); ctx.arc(pt.x,pt.y,r*2.5,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  }
}

// ─── Click burst ──────────────────────────────────────────────────────────────
canvas.addEventListener('click', e=>{
  if (!isRunning) return;
  const x=e.clientX, y=e.clientY, h=anyHue();
  spawnSparks(26, x, y);
  rings.push({x,y,r:0,speed:5.5,h,a:0.88,lw:2});
  if (FX.orbs)  { const o=makeOrb(x,y); o.r=rnd(50,100); o.a=0.22; o.decay=0.007; o.flash=1; orbs.push(o); }
  if (FX.hex)   { const h2=makeHex(x,y); h2.r=rnd(32,70); h2.a=0.22; hexes.push(h2); }
  if (FX.stars) { const s=makeStar(x,y); s.r=rnd(26,58); s.a=0.26; starPtcls.push(s); }
});

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  requestAnimationFrame(render);
  smoothAmp += (amplitude - smoothAmp) * 0.14;
  tickXmb();
  if (!isRunning) return;

  // Draw bg blobs (accumulate into trail)
  drawBg();

  // Trail fade toward dark
  ctx.fillStyle = 'rgba(8, 10, 14, 0.055)';
  ctx.fillRect(0, 0, W, H);

  if (FX.prism)   drawPrism();
  if (FX.ribbons) { tickRibbons(); drawRibbons(); }
  if (FX.orbs)    { tickOrbs();   drawOrbs();    }
  if (FX.hex)     { tickHexes();  drawHexes();   }
  if (FX.stars)   { tickStars();  drawStarPtcls();}
  if (FX.rings)   { tickRings();  drawRings();   }

  // Sparks only when correcting
  if (FX.sparks && isCorrecting && smoothAmp > 0.008)
    spawnSparks(Math.ceil(smoothAmp * 7));
  tickSparks(); drawSparks();
  tickTrails(); drawTrails();

  // Center glow when singing
  if (smoothAmp > 0.008) {
    const h=anyHue(), rad=240+smoothAmp*320;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    g.addColorStop(0,`hsla(${h},18%,85%,${smoothAmp*0.1})`);
    g.addColorStop(1,`hsla(${h},10%,65%,0)`);
    ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  }
}

// ─── Worklet messages ─────────────────────────────────────────────────────────
function onWorkletMsg(e) {
  const { detectedNote:dn, correctedNote:cn, rms } = e.data;
  amplitude = Math.min(1, (rms??0) * 8);
  if (cn >= 0) {
    const note=cn%12, det=dn%12;
    currentNote = note;
    isCorrecting = (dn !== cn);

    const noteEl  = document.getElementById('note-display');
    const arrowEl = document.getElementById('arrow-display');
    const h = NOTE_HUE[note];
    noteEl.textContent  = KEYS[note];
    noteEl.style.color  = `hsl(${h},18%,90%)`;
    noteEl.style.textShadow = `0 0 60px hsl(${h},18%,90%), 0 0 130px hsla(${h},18%,90%,0.25)`;
    arrowEl.textContent = isCorrecting ? `${KEYS[det]}  →  ${KEYS[note]}` : '';
    document.getElementById('conf-bar').style.width = `${Math.min(100,amplitude*100)}%`;

    if (cn !== prevNote) {
      prevNote = cn;
      if (FX.rings) spawnRing(note);
      if (FX.orbs)  orbs.forEach(o=>{ o.flash=0.45+Math.random()*0.25; });
    }
  }
}

// ─── Param controls ───────────────────────────────────────────────────────────
function sendParams() {
  if (workletNode) workletNode.port.postMessage({ tune, keyIdx, scaleIdx });
}
document.getElementById('sl-tune').addEventListener('input', e=>{ tune=e.target.value/100; sendParams(); });
document.getElementById('sl-wide').addEventListener('input', e=>{ wide=e.target.value/100; if(workletNode) workletNode.port.postMessage({wide}); });
document.getElementById('sel-key').addEventListener('change', e=>{ keyIdx=parseInt(e.target.value); sendParams(); });
document.getElementById('sel-scale').addEventListener('change', e=>{ scaleIdx=parseInt(e.target.value); sendParams(); });
document.addEventListener('keydown', e=>{ if((e.key==='b'||e.key==='B')&&workletNode) workletNode.port.postMessage({bypass:true}); });
document.addEventListener('keyup',   e=>{ if((e.key==='b'||e.key==='B')&&workletNode) workletNode.port.postMessage({bypass:false}); });

// ─── Recording ────────────────────────────────────────────────────────────────
let recorder=null, recChunks=[], isRecording=false, recType=null;

function startRecording(type) {
  if (!actx||!audioDest) return;
  recType=type; recChunks=[];
  const stream = type==='video'
    ? new MediaStream([...canvas.captureStream(30).getTracks(), ...audioDest.stream.getTracks()])
    : audioDest.stream;
  const cands = type==='video'
    ? ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
    : ['audio/webm;codecs=opus','audio/webm','audio/ogg'];
  const mime = cands.find(m=>MediaRecorder.isTypeSupported(m)) || '';
  recorder = new MediaRecorder(stream, mime?{mimeType:mime}:{});
  recorder.ondataavailable = e=>{ if(e.data.size>0) recChunks.push(e.data); };
  recorder.onstop = ()=>downloadRec(type);
  recorder.start(200);
  isRecording=true;
  document.getElementById('ricon-video').classList.toggle('recording', type==='video');
  document.getElementById('ricon-audio').classList.toggle('recording', type==='audio');
}
function stopRecording() {
  recorder?.stop(); isRecording=false;
  document.getElementById('ricon-video').classList.remove('recording');
  document.getElementById('ricon-audio').classList.remove('recording');
}
function downloadRec(type) {
  const blob=new Blob(recChunks,{type:type==='video'?'video/webm':'audio/webm'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`silvertune-${Date.now()}.webm`; a.click();
  URL.revokeObjectURL(url);
}

// REC panel buttons
document.getElementById('ritem-video').addEventListener('click', ()=>{
  if (isRecording) { stopRecording(); return; }
  document.getElementById('rec-modal').classList.add('open');
});
document.getElementById('rec-start-video').addEventListener('click', ()=>{
  document.getElementById('rec-modal').classList.remove('open');
  startRecording('video');
});
document.getElementById('rec-start-audio').addEventListener('click', ()=>{
  document.getElementById('rec-modal').classList.remove('open');
  startRecording('audio');
});
document.getElementById('ritem-audio').addEventListener('click', ()=>{
  isRecording ? stopRecording() : startRecording('audio');
});
document.getElementById('ritem-minimal').addEventListener('click', ()=>{
  const on=document.body.classList.toggle('minimal');
  document.getElementById('ricon-minimal').classList.toggle('active-mode', on);
});
document.getElementById('rec-cancel-btn').addEventListener('click', ()=>{
  document.getElementById('rec-modal').classList.remove('open');
});

// ─── Start ────────────────────────────────────────────────────────────────────
document.getElementById('start').addEventListener('click', async () => {
  document.getElementById('start').remove();
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }, video:false,
  });
  actx = new AudioContext({ latencyHint: 0 });
  console.log(`base: ${actx.baseLatency*1000|0}ms  output: ${actx.outputLatency*1000|0}ms  sr: ${actx.sampleRate}Hz`);
  const source = actx.createMediaStreamSource(stream);
  await actx.audioWorklet.addModule('worklet.js');
  workletNode = new AudioWorkletNode(actx,'silvertune-processor',{
    numberOfInputs:1, numberOfOutputs:1, outputChannelCount:[1],
  });
  workletNode.port.onmessage = onWorkletMsg;
  sendParams();
  audioDest = actx.createMediaStreamDestination();
  source.connect(workletNode);
  workletNode.connect(actx.destination);
  workletNode.connect(audioDest);
  initOrbs(); initHexes(); initStarPtcls();
  isRunning = true;
});

render();
</script>
